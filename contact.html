<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - SaveX</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sohne@1.0.0/sohne.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon"><i class="fas fa-envelope"></i></div>
      Contact Us
    </div>
    
    <div class="card">
      <h2>Get in Touch</h2>
      <p>We'd love to hear from you! Reach out for support, suggestions, or feedback.</p>
      
      <div class="contact-methods" style="margin-top: 25px; text-align: center;">
        <div style="margin-bottom: 20px;">
          <h3><i class="fas fa-envelope"></i> Email</h3>
          <p><a href="mailto:VirgeesCUmail@gmail.com">VirgeesCUmail@gmail.com</a></p>
        </div>
        
        <div style="margin-bottom: 20px;">
          <h3><i class="fas fa-paper-plane"></i> Social Media</h3>
            <a href="https://t.me/VirgeesAdarshDevPvtLtd" target="_blank" style="margin-right: 15px;">
              <i class="fab fa-telegram"></i> Telegram
            </a>
            <a href="https://instagram.com/virgeesADPL" target="_blank">
              <i class="fab fa-instagram"></i> Instagram
            </a>
        </div>
      </div>
      
      <form class="contact-form" style="margin-top: 25px;" onsubmit="event.preventDefault(); alert('Message Sent! We will get back to you soon.')">
        <div class="form-group">
          <label class="form-label">Your Name</label>
          <input type="text" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label class="form-label">Message</label>
          <textarea rows="4" placeholder="Your message here..." required></textarea>
        </div>
        <button type="submit"><i class="fas fa-paper-plane"></i> Send Message</button>
      </form>
    </div>
  </div>
  
  <div class="bottom-nav">
    <div class="nav-item" onclick="navigateTo('index.html')">
      <i class="fas fa-home nav-icon"></i>
      <span class="nav-label">Home</span>
    </div>
  </div>
  
  <script>
    function navigateTo(url) {
      window.location.href = url;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const body = document.body;
      const darkMode = localStorage.getItem('darkMode') === 'true';
      if (darkMode) body.classList.add('dark-mode');
      const theme = localStorage.getItem('selectedTheme') || 'default';
      if (theme !== 'default') body.classList.add(`theme-${theme}`);
      const font = localStorage.getItem('selectedFont') || 'poppins';
      body.classList.forEach(c => c.startsWith('font-') && body.classList.remove(c));
      body.classList.add(`font-${font}`);
    });
  </script>
</body>
</html>
