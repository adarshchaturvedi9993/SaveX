<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Gullak</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="font-poppins">
  <div class="container">
    <div class="header">
      <div class="header-icon"><i class="fas fa-envelope"></i></div>
      Contact Us
    </div>
    
    <div class="card">
      <h2>Get in Touch</h2>
      <p>We'd love to hear from you! Reach out for support or suggestions.</p>
      
      <div class="contact-methods">
        <div class="contact-item">
          <i class="fas fa-envelope"></i>
          <h3>Email</h3>
          <p><a href="mailto:VirgeesCUmail@gmail.com">VirgeesCUmail@gmail.com</a></p>
        </div>
        
        <div class="contact-item">
          <i class="fas fa-map-marker-alt"></i>
          <h3>Address</h3>
          <p>Beohari, Distt - Shahdol, 484774, MP, India</p>
        </div>
        
        <div class="contact-item">
          <i class="fas fa-paper-plane"></i>
          <h3>Social Media</h3>
          <div class="social-links">
            <a href="https://t.me/VirgeesAdarshDevPvtLtd" target="_blank">
              <i class="fab fa-telegram"></i> Telegram
            </a>
            <a href="https://instagram.com/virgeesADPL" target="_blank">
              <i class="fab fa-instagram"></i> Instagram
            </a>
          </div>
        </div>
      </div>
      
      <form class="contact-form" onsubmit="event.preventDefault(); showAlert('Message Sent', 'We'll get back to you soon!', 'success')">
        <div class="form-group">
          <label class="form-label">Your Name</label>
          <input type="text" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label class="form-label">Message</label>
          <textarea rows="4" placeholder="Your message here..." required></textarea>
        </div>
        <button type="submit"><i class="fas fa-paper-plane"></i> Send Message</button>
      </form>
    </div>
  </div>
  
  <div class="bottom-nav">
    <div class="nav-item" onclick="navigateTo('index.html')">
      <i class="fas fa-home nav-icon"></i>
      <span class="nav-label">Home</span>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
